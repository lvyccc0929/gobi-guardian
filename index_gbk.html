<script>

var total=assets.length,loaded=0;
var loader=document.getElementById("global-loader");

function update(){var p=Math.round(loaded/total*100);fill.style.width=p+"%";pct.textContent=p+"%";if(loaded>=total)finish()}
function finish(){setTimeout(function(){loader.style.opacity="0";loader.style.transition="opacity 0.5s";setTimeout(function(){loader.style.display="none";if(window._startP0Animation)window._startP0Animation()},500)},400)}
assets.forEach(function(url){var img=new Image();img.onload=function(){loaded++;update()};img.onerror=function(){loaded++;update()};img.src=url});

window._startGlobalLoader=function(){loader.style.display="flex"};
})();

<script>
var isWeChat=/MicroMessenger/i.test(navigator.userAgent);
if(isWeChat){document.getElementById("wx-guide").classList.add("show")}
function copyLink(){var u=location.href;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(u).then(function(){var e=document.getElementById("wx-copied");e.classList.add("show");setTimeout(function(){e.classList.remove("show")},2500)}).catch(function(){})}else{var t=document.createElement("textarea");t.value=u;t.style.cssText="position:fixed;left:-9999px";document.body.appendChild(t);t.select();try{document.execCommand("copy")}catch(e){}document.body.removeChild(t);document.getElementById("wx-copied").classList.add("show");setTimeout(function(){document.getElementById("wx-copied").classList.remove("show")},2500)}}

if(!isWeChat){
(function(){
var locEl=document.getElementById("loc"),tagEl=document.getElementById("tag"),titleEl=document.getElementById("title"),subtitleEl=document.getElementById("subtitle");
var active=false,startTime=0,titleShown=false,subtitleComplete=false,timer=0;
function update(elapsed){
  if(elapsed>=0.8&&locEl.style.opacity==="0"){locEl.textContent="2025年10月 · 新疆哈密戈壁";locEl.style.opacity="1";setTimeout(function(){locEl.style.opacity="0"},2000)}
  if(elapsed>=1.2&&!titleShown){titleShown=true;titleEl.style.opacity="1"}
  if(elapsed>=2.0&&!subtitleComplete){var full="GUARDIAN OF THE GOBI";timer+=16;var n=Math.min(Math.floor(timer/45),full.length);subtitleEl.textContent=full.slice(0,n)+(n<full.length?"|":"");subtitleEl.style.opacity="1";if(n>=full.length){subtitleComplete=true;subtitleEl.textContent=full;setTimeout(function(){tagEl.innerHTML='两千公里，二十四个日夜，一场修复之旅<br><span style="font-size:min(3vw,13px);color:#8B7355">基于真实事件改编</span>';tagEl.style.opacity="1";setTimeout(function(){var bg=document.createElement('div');bg.style.cssText='position:fixed;inset:0;background:#000;z-index:99999;opacity:0;transition:opacity 0.8s';document.body.appendChild(bg);requestAnimationFrame(function(){bg.style.opacity='1'});setTimeout(function(){location.href='demo-p1.html'},900)},2500)},400)}}
}
function loop(t){if(!active)return;if(!startTime)startTime=t;var elapsed=(t-startTime)/1000;if(elapsed>12)return;update(elapsed);requestAnimationFrame(loop)}
window._startP0Animation=function(){active=true;startTime=0;requestAnimationFrame(loop)};
})();
}
</script>



<audio id="bgm" src="assets/bgm.m4a" loop preload="auto"></audio>
<div id="bgm-toggle" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99999;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)" onclick="toggleBgm()" title="音乐">??</div><script>
(function(){
var bgm=document.getElementById("bgm"),toggle=document.getElementById("bgm-toggle"),bgmOn=false;
var S_KEY="bgm_time",P_KEY="bgm_playing";
function restoreBgm(){
  var savedTime=parseFloat(sessionStorage.getItem(S_KEY)||"0");
  var wasPlaying=sessionStorage.getItem(P_KEY)==="1";
  if(savedTime>0.5&&bgm&&bgm.readyState>=1){bgm.currentTime=savedTime}
  if(wasPlaying){
    bgmOn=true;
    bgm.play().then(function(){if(toggle)toggle.textContent="?"}).catch(function(){bgmOn=false;if(toggle)toggle.textContent="??"})
  }
}
if(bgm){if(bgm.readyState>=1){restoreBgm()}else{bgm.addEventListener("loadedmetadata",restoreBgm,{once:true})}}
window.addEventListener("beforeunload",function(){if(bgm){sessionStorage.setItem(S_KEY,bgm.currentTime);sessionStorage.setItem(P_KEY,bgmOn?"1":"0")}});
setInterval(function(){if(bgm&&bgmOn&&!bgm.paused){sessionStorage.setItem(S_KEY,bgm.currentTime)}},1000);
window.toggleBgm=function(){bgmOn=!bgmOn;if(bgmOn){bgm.play().then(function(){toggle.textContent="?"}).catch(function(){bgmOn=false;toggle.textContent="??"})}else{bgm.pause();toggle.textContent="??"}sessionStorage.setItem(P_KEY,bgmOn?"1":"0")};
window.pauseBgmForVideo=function(){if(bgm&&bgmOn){bgm.pause();sessionStorage.setItem(S_KEY,bgm.currentTime)}};
window.resumeBgmAfterVideo=function(){if(!bgmOn)return;bgm.play().then(function(){toggle.textContent="?"}).catch(function(){})};
document.addEventListener("play",function(e){if(e.target.tagName==="VIDEO"){var v=e.target;var el=v;while(el){var s=getComputedStyle(el);if(s.display==="none"||parseFloat(s.opacity)<0.1)return;el=el.parentElement}window.pauseBgmForVideo()}},true);
document.addEventListener("ended",function(e){if(e.target.tagName==="VIDEO"){window.resumeBgmAfterVideo()}},true);
document.addEventListener("click",function e(){if(!bgmOn){bgmOn=true;bgm.play().then(function(){toggle.textContent="?"}).catch(function(){bgmOn=false});sessionStorage.setItem(P_KEY,"1")}},{once:true});
})();
</script>
