<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>戈壁守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#content-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1}
#bgm-toggle{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99999;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#bgm-toggle:active{background:rgba(0,0,0,0.8);transform:translateX(-50%) scale(0.9)}
</style>
</head>
<body>
<iframe id="content-frame" src="demo-p0.html" allow="autoplay; fullscreen"></iframe>
<audio id="bgm" src="assets/bgm.m4a" loop preload="auto"></audio>
<div id="bgm-toggle" onclick="toggleBgm()" title="音乐">🔇</div>
<script>
(function(){
var bgm=document.getElementById("bgm"),toggle=document.getElementById("bgm-toggle"),bgmOn=false,frame=document.getElementById("content-frame");
var S_KEY="bgm_time",P_KEY="bgm_playing";

// Restore
function restoreBgm(){
  var savedTime=parseFloat(sessionStorage.getItem(S_KEY)||"0");
  var wasPlaying=sessionStorage.getItem(P_KEY)==="1";
  if(savedTime>0.5&&bgm&&bgm.readyState>=1){bgm.currentTime=savedTime}
  if(wasPlaying){
    bgmOn=true;
    bgm.play().then(function(){if(toggle)toggle.textContent="♪"}).catch(function(){bgmOn=false;if(toggle)toggle.textContent="🔇"});
  }
}
if(bgm){
  if(bgm.readyState>=1){restoreBgm()}
  else{bgm.addEventListener("loadedmetadata",restoreBgm,{once:true})}
}

// Save periodically
setInterval(function(){if(bgm&&bgmOn&&!bgm.paused){sessionStorage.setItem(S_KEY,bgm.currentTime)}},1000);
window.addEventListener("beforeunload",function(){if(bgm){sessionStorage.setItem(S_KEY,bgm.currentTime);sessionStorage.setItem(P_KEY,bgmOn?"1":"0")}});

// Toggle
window.toggleBgm=function(){
  bgmOn=!bgmOn;
  if(bgmOn){bgm.play().then(function(){toggle.textContent="♪"}).catch(function(){bgmOn=false;toggle.textContent="🔇"})}
  else{bgm.pause();toggle.textContent="🔇"}
  sessionStorage.setItem(P_KEY,bgmOn?"1":"0");
};

// First click
document.addEventListener("click",function e(){
  if(!bgmOn){bgmOn=true;bgm.play().then(function(){toggle.textContent="♪"}).catch(function(){bgmOn=false});sessionStorage.setItem(P_KEY,"1")}
},{once:true});

// Listen for messages from iframe pages
window.addEventListener("message",function(e){
  var d=e.data;
  if(!d)return;
  if(d.type==="nav"){
    // Navigate iframe to new page
    frame.src=d.page;
  }else if(d.type==="video-play"){
    if(bgm&&bgmOn){bgm.pause();sessionStorage.setItem(S_KEY,bgm.currentTime);sessionStorage.setItem("bgm_paused","1")}
  }else if(d.type==="video-ended"){
    if(sessionStorage.getItem("bgm_paused")==="1"){sessionStorage.removeItem("bgm_paused");bgmOn=true;bgm.play().then(function(){toggle.textContent="♪"}).catch(function(){})}
  }else if(d.type==="showOutro"){
    // Forward outro navigation
    if(d.page){frame.src=d.page}
  }
});
})();
</script>
</body>
</html>
