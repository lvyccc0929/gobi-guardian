<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="landscape.js"></script>
<title>序章 · 戈壁守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0a06;font-family:"Noto Serif SC","Noto Sans SC",sans-serif;-webkit-text-size-adjust:100%!important}
#app{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

#gps-dot{width:8px;height:8px;border-radius:50%;background:#00FF88;box-shadow:0 0 10px rgba(0,255,136,0.6),0 0 25px rgba(0,255,136,0.3);opacity:1;margin-bottom:24px;z-index:2}
#title{font-family:"Noto Serif SC",serif;font-size:min(7vw,8vh,56px);font-weight:700;color:#F5F0E8;letter-spacing:0.15em;text-shadow:0 0 16px rgba(200,170,100,0.3),0 2px 4px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.6s;z-index:2;text-align:center;line-height:1.3;padding:0 16px}
#loc{font-family:"Noto Serif SC",serif;font-size:min(3.5vw,4vh,18px);color:#8B7355;letter-spacing:0.25em;opacity:0;transition:opacity 0.8s;margin-top:min(20px,3vh);z-index:2;text-align:center}
#subtitle{font-family:"Noto Sans SC",sans-serif;font-size:min(3vw,3.5vh,16px);color:#8B7355;letter-spacing:0.25em;opacity:0;transition:opacity 0.5s;margin-top:min(14px,2vh);z-index:2;text-align:center}
#tag{font-family:"Noto Serif SC",serif;font-size:min(3.8vw,4vh,19px);color:#C4A46C;letter-spacing:0.2em;opacity:0;transition:opacity 0.6s;margin-top:min(28px,4vh);z-index:2;text-align:center;line-height:1.8;padding:0 16px}

#chapter-outro{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:99999;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#chapter-outro .co-text{font-family:"Noto Serif SC",serif;font-size:min(17px,3.5vw);color:#C4A46C;text-align:center;max-width:min(300px,80vw);line-height:1.8;margin-bottom:32px;padding:0 16px}
#chapter-outro .co-next{font-family:"Noto Sans SC",sans-serif;font-size:14px;color:#8B7355;text-align:center;animation:coPulse 2s infinite}
@keyframes coPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ── 微信引导层 ── */
#wx-guide{position:fixed;inset:0;z-index:999999;display:none;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(0,0,0,0.95);color:#e8e0d5;padding-top:12vh}
#wx-guide.show{display:flex}
#wx-guide .wx-arrow{font-size:60px;margin-bottom:8px;animation:wxBounce 1.5s ease-in-out infinite;align-self:flex-end;margin-right:20px}
#wx-guide .wx-icon{width:50px;height:50px;border-radius:50%;border:2px solid rgba(200,170,100,0.5);display:flex;align-items:center;justify-content:center;margin:20px auto 16px}
#wx-guide .wx-icon svg{width:28px;height:28px;fill:#c8aa64}
#wx-guide .wx-title{font-family:"Noto Serif SC",serif;font-size:20px;color:#c8aa64;letter-spacing:2px;margin-bottom:12px;text-align:center}
#wx-guide .wx-desc{font-size:14px;color:rgba(232,224,213,0.6);text-align:center;line-height:2;padding:0 32px}
#wx-guide .wx-desc b{color:#FFD700;font-weight:700}
#wx-guide .wx-browsers{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center;padding:0 20px}
#wx-guide .wx-browsers span{font-size:12px;color:rgba(232,224,213,0.4);padding:6px 16px;border:1px solid rgba(200,170,100,0.2);border-radius:16px}
#wx-guide .wx-copy{margin-top:24px;padding:10px 32px;background:rgba(200,170,100,0.15);border:1px solid rgba(200,170,100,0.4);border-radius:20px;color:#c8aa64;font-size:13px;cursor:pointer;transition:all 0.2s}
#wx-guide .wx-copy:active{background:rgba(200,170,100,0.3)}
#wx-guide .wx-copied{margin-top:10px;font-size:11px;color:#00FF88;opacity:0;transition:opacity 0.3s}
#wx-guide .wx-copied.show{opacity:1}
@keyframes wxBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>
<!-- 微信引导层：仅微信浏览器显示 -->
<div id="wx-guide">
  <div class="wx-arrow">↗</div>
  <div class="wx-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg></div>
  <div class="wx-title">请用浏览器打开</div>
  <div class="wx-desc">点击右上角 <b>···</b><br>选择 <b>「在浏览器打开」</b></div>
  <div class="wx-browsers">
    <span>夸克</span><span>百度</span><span>Safari</span><span>Chrome</span>
  </div>
  <div class="wx-copy" onclick="copyLink()">📋 复制链接</div>
  <div class="wx-copied" id="wx-copied">链接已复制，请粘贴到浏览器打开</div>
</div>

<div id="app">
  <div id="gps-dot"></div>
  <div id="title">戈壁守护者</div>
  <div id="loc"></div>
  <div id="subtitle"></div>
  <div id="tag"></div>
</div>

<script>
// ── 微信检测 ──
var isWeChat=/MicroMessenger/i.test(navigator.userAgent);
if(isWeChat){window.__noForceLandscape=true;
  document.getElementById("wx-guide").classList.add("show");
}
window.copyLink=function(){
  var url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){
      var el=document.getElementById("wx-copied");
      el.classList.add("show");
      setTimeout(function(){el.classList.remove("show")},2500);
    }).catch(function(){});
  }else{
    // 兜底：创建临时 input
    var ta=document.createElement("textarea");
    ta.value=url;ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy")}catch(e){}
    document.body.removeChild(ta);
    var el=document.getElementById("wx-copied");
    el.classList.add("show");
    setTimeout(function(){el.classList.remove("show")},2500);
  }
};

// ── 原有动画逻辑（非微信才执行） ──
if(!isWeChat){
(function(){
var locEl=document.getElementById("loc");
var tagEl=document.getElementById("tag");
var titleEl=document.getElementById("title");
var subtitleEl=document.getElementById("subtitle");
var active=true,startTime=0,titleShown=false,subtitleComplete=false,timer=0;
function update(elapsed){
  if(elapsed>=0.8&&locEl.style.opacity==="0"){locEl.textContent="2025年10月 · 新疆哈密戈壁";locEl.style.opacity="1";setTimeout(function(){locEl.style.opacity="0"},2000)}
  if(elapsed>=1.2&&!titleShown){titleShown=true;titleEl.style.opacity="1"}
  if(elapsed>=2.0&&!subtitleComplete){var full="GUARDIAN OF THE GOBI";timer+=16;var n=Math.min(Math.floor(timer/45),full.length);subtitleEl.textContent=full.slice(0,n)+(n<full.length?"|":"");subtitleEl.style.opacity="1";if(n>=full.length){subtitleComplete=true;subtitleEl.textContent=full;setTimeout(function(){tagEl.innerHTML='两千公里，二十四个日夜，一场修复之旅<br><span style="font-size:min(13px,2.5vw);color:#8B7355">基于真实事件改编</span>';tagEl.style.opacity="1";setTimeout(function(){if(window.showOutro)window.showOutro()},2500)},400)}}
}
function loop(t){if(!active)return;if(!startTime)startTime=t;var elapsed=(t-startTime)/1000;if(elapsed>12)return;update(elapsed);requestAnimationFrame(loop)}
requestAnimationFrame(loop);
})();
}
</script>
<div id="chapter-outro"><div class="co-text">2025年，新疆哈密戈壁。一段被风沙掩埋的故事，即将展开。</div><div class="co-next">本章结束<br><span style="font-size:16px;color:#FFD700;margin-top:8px;display:inline-block">点击进入下一章</span></div></div>
<script>(function(){var outro=document.getElementById("chapter-outro");window.showOutro=function(){if(outro){outro.style.display="flex";setTimeout(function(){outro.style.opacity="1"},50);outro.addEventListener("click",function(){window.location.href="demo-p1.html"})}}})()</script>
</body>
</html>
