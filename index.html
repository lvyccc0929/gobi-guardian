<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<script src="landscape.js"></script>
<title>序章 · 戈壁守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0a06;font-family:"Noto Serif SC","Noto Sans SC",sans-serif}
#app{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{position:absolute;top:0;left:0;display:none}
#gps-dot{width:8px;height:8px;border-radius:50%;background:#00FF88;box-shadow:0 0 10px rgba(0,255,136,0.6),0 0 25px rgba(0,255,136,0.3);opacity:1;margin-bottom:24px;z-index:2}
#title{font-family:"Noto Serif SC",serif;font-size:clamp(32px,7vw,56px);font-weight:700;color:#F5F0E8;letter-spacing:8px;text-shadow:0 0 16px rgba(200,170,100,0.3),0 2px 4px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.6s;z-index:2;text-align:center;line-height:1.3}
#loc{font-family:"Noto Serif SC",serif;font-size:clamp(13px,3.5vw,18px);color:#8B7355;letter-spacing:4px;opacity:0;transition:opacity 0.8s;margin-top:20px;z-index:2;text-align:center}
#subtitle{font-family:"Noto Sans SC",sans-serif;font-size:clamp(12px,3vw,16px);color:#8B7355;letter-spacing:4px;opacity:0;transition:opacity 0.5s;margin-top:14px;z-index:2;text-align:center}
#tag{font-family:"Noto Serif SC",serif;font-size:clamp(14px,3.8vw,19px);color:#C4A46C;letter-spacing:3px;opacity:0;transition:opacity 0.6s;margin-top:28px;z-index:2;text-align:center;line-height:1.8}

#chapter-outro{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:99999;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#chapter-outro .co-text{font-family:"Noto Serif SC",serif;font-size:17px;color:#C4A46C;text-align:center;max-width:300px;line-height:1.8;margin-bottom:32px}
#chapter-outro .co-next{font-family:"Noto Sans SC",sans-serif;font-size:14px;color:#8B7355;text-align:center;animation:coPulse 2s infinite}
@keyframes coPulse{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <div id="gps-dot"></div>
  <div id="title">戈壁守护者</div>
  <div id="loc"></div>
  <div id="subtitle"></div>
  <div id="tag"></div>
</div>
<script>
(function(){
var gpsDot=document.getElementById("gps-dot");
var locEl=document.getElementById("loc");
var tagEl=document.getElementById("tag");
var titleEl=document.getElementById("title");
var subtitleEl=document.getElementById("subtitle");

var active=true,startTime=0;
var titleShown=false;
var subtitleComplete=false,timer=0;

function update(elapsed){
  if(elapsed>=0.8&&locEl.style.opacity==="0"){
    locEl.textContent="2025年10月 · 新疆哈密戈壁";
    locEl.style.opacity="1";
    setTimeout(function(){locEl.style.opacity="0"},2000);
  }
  if(elapsed>=1.2&&!titleShown){
    titleShown=true;
    titleEl.style.opacity="1";
  }
  if(elapsed>=2.0&&!subtitleComplete){
    var full="GUARDIAN OF THE GOBI";
    timer+=16;
    var n=Math.min(Math.floor(timer/45),full.length);
    subtitleEl.textContent=full.slice(0,n)+(n<full.length?"|":"");
    subtitleEl.style.opacity="1";
    if(n>=full.length){
      subtitleComplete=true;
      subtitleEl.textContent=full;
      setTimeout(function(){
        tagEl.innerHTML="两千公里，二十四个日夜，一场修复之旅<br><span style='font-size:13px;color:#8B7355'>基于真实事件改编</span>";
        tagEl.style.opacity="1";
        setTimeout(function(){if(window.showOutro)window.showOutro()},2500);
      },400);
    }
  }
}
function loop(t){
  if(!active)return;
  if(!startTime)startTime=t;
  var elapsed=(t-startTime)/1000;
  if(elapsed>12)return;
  update(elapsed);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
<div id="chapter-outro"><div class="co-text">2025年，新疆哈密戈壁。一段被风沙掩埋的故事，即将展开。</div><div class="co-next">本章结束<br><span style="font-size:16px;color:#FFD700;margin-top:8px;display:inline-block">点击进入下一章</span></div></div>
<script>(function(){var outro=document.getElementById("chapter-outro");window.showOutro=function(){if(outro){outro.style.display="flex";setTimeout(function(){outro.style.opacity="1"},50);outro.addEventListener("click",function(){window.location.href="demo-p1.html"})}}})()</script>
</body>
</html>
