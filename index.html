<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>戈壁守望者 · GUARDIAN OF THE GOBI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,34px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#0b0906;font-family:'Noto Sans SC',sans-serif;color:#e8e0d5;-webkit-tap-highlight-color:transparent}

#app{max-width:420px;margin:0 auto;padding:0 24px;min-height:100vh;position:relative;z-index:1}

#hero{padding:56px 0 20px;text-align:center;position:relative}
#hero .en{font-family:'Noto Serif SC',serif;font-size:9px;letter-spacing:6px;color:rgba(200,170,100,0.35);margin-bottom:14px}
#hero h1{font-family:'Noto Serif SC',serif;font-size:36px;font-weight:900;letter-spacing:8px;line-height:1.2;
  background:linear-gradient(180deg,#dcc680 0%,#b89450 40%,#967538 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,0.6));
}
#hero .tagline{font-size:12px;color:rgba(200,180,140,0.4);margin-top:12px;letter-spacing:3px}

#rule{width:32px;height:1px;background:rgba(200,170,100,0.3);margin:0 auto 28px;position:relative}
#rule::after{content:'';position:absolute;left:50%;top:50%;width:4px;height:4px;background:#FFD700;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(255,215,0,0.5)}

#arc{position:relative;padding:12px 0 32px;text-align:center}
#arc .scene:active{background:rgba(200,170,100,0.04);margin:0 -24px;padding-left:24px;padding-right:24px}
.scene .scene .scene .scene .scene .scene .scene:active #foot{padding:36px 0 52px;text-align:center}
#foot #foot #grain{position:fixed;inset:0;z-index:0;opacity:0.025;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* 微信引导 */
#wx-guide{position:fixed;inset:0;z-index:999999;display:none;flex-direction:column;align-items:center;justify-content:flex-start;background:rgba(0,0,0,0.95);color:#e8e0d5;padding-top:12vh;font-family:"Noto Serif SC",serif}
#wx-guide.show{display:flex}
#wx-guide .wx-arrow{font-size:min(14vw,60px);margin-bottom:8px;animation:wxB 1.5s ease-in-out infinite;align-self:flex-end;margin-right:20px}
#wx-guide .wx-icon{width:50px;height:50px;border-radius:50%;border:2px solid rgba(200,170,100,0.5);display:flex;align-items:center;justify-content:center;margin:20px auto 16px}
#wx-guide .wx-icon svg{width:28px;height:28px;fill:#c8aa64}
#wx-guide .wx-title{font-size:min(5vw,20px);color:#c8aa64;letter-spacing:2px;margin-bottom:12px}
#wx-guide .wx-desc{font-size:min(3.5vw,14px);color:rgba(232,224,213,0.6);text-align:center;line-height:2;padding:0 32px}
#wx-guide .wx-desc b{color:#FFD700;font-weight:700}
#wx-guide .wx-browsers{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap;justify-content:center;padding:0 20px}
#wx-guide .wx-browsers span{font-size:12px;color:rgba(232,224,213,0.4);padding:6px 16px;border:1px solid rgba(200,170,100,0.2);border-radius:16px}
#wx-guide .wx-copy{margin-top:24px;padding:10px 32px;background:rgba(200,170,100,0.15);border:1px solid rgba(200,170,100,0.4);border-radius:20px;color:#c8aa64;font-size:13px;cursor:pointer}
#wx-guide .wx-copy:active{background:rgba(200,170,100,0.3)}
#wx-guide .wx-copied{margin-top:10px;font-size:11px;color:#00FF88;opacity:0;transition:opacity 0.3s}
#wx-guide .wx-copied.show{opacity:1}
@keyframes wxB{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}</style>
</head>
<body>

<div id="wx-guide">
<div class="wx-arrow">&#x2197;</div>
<div class="wx-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="5" r="2"/><circle cx="12" cy="19" r="2"/></svg></div>
<div class="wx-title">请用浏览器打开</div>
<div class="wx-desc">点击右上角 <b>···</b><br>选择 <b>「在浏览器打开」</b></div>
<div class="wx-browsers"><span>夸克</span><span>百度</span><span>Safari</span><span>Chrome</span></div>
<div class="wx-copy" onclick="copyLink()">&#x1F4CB; 复制链接</div>
<div class="wx-copied" id="wx-copied">链接已复制</div>
</div>
<script>
var isWeChat=/MicroMessenger/i.test(navigator.userAgent);
if(isWeChat)document.getElementById("wx-guide").classList.add("show");
function copyLink(){
var u=location.href;
if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(u).then(function(){var e=document.getElementById("wx-copied");e.classList.add("show");setTimeout(function(){e.classList.remove("show")},2500)}).catch(function(){})}
else{var t=document.createElement("textarea");t.value=u;t.style.cssText="position:fixed;left:-9999px";document.body.appendChild(t);t.select();try{document.execCommand("copy")}catch(e){}document.body.removeChild(t);document.getElementById("wx-copied").classList.add("show");setTimeout(function(){document.getElementById("wx-copied").classList.remove("show")},2500)}
}
</script>

<div id="grain"></div>
<div id="app">
  <div id="hero">
    <div class="en">GUARDIAN OF THE GOBI</div>
    <h1>戈壁守望者</h1>
    <div class="tagline">基于真实事件改编 · 8 幕互动叙事</div>
  </div>

  <div id="rule"></div>

  
</body>
</html>
