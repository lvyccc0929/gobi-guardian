<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; width: 340px; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    h2 { font-size: 12px; margin: 12px 0 6px; color: #555; text-transform: uppercase; letter-spacing: .5px; }
    .section-header { margin: 12px 0 6px; }
    .section-header .toggle { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .provider { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .provider:last-child { border-bottom: none; }
    .name { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
    .server { font-size: 12px; padding: 6px 8px; background: #f6f8fa; border-radius: 4px; margin-bottom: 10px; }
    .ok { color: #137333; font-size: 12px; }
    .err { color: #c5221f; font-size: 12px; word-break: break-word; }
    .sub { font-size: 11px; color: #888; margin: 2px 0; }
    .acctsel { width: 100%; margin: 4px 0; padding: 4px; font-size: 12px; }
    .keyrow { display: flex; gap: 4px; margin: 4px 0; }
    .keyrow input { flex: 1; padding: 4px; font-size: 12px; font-family: monospace; }
    button { padding: 5px 10px; font-size: 11px; cursor: pointer; margin-right: 4px; }
    .discover { background: #f0f0f0; border: 1px solid #ccc; }
    #sync { margin-top: 4px; background: #1a73e8; color: #fff; border: none; padding: 6px 12px; }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; }
    .toggle input { transform: scale(1.1); }
    .section-block { padding: 8px; background: #fafafa; border-radius: 4px; margin-bottom: 10px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Gemini Bridge</h1>
  <div id="server" class="server">Checking server…</div>

  <div class="section-header">
    <label class="toggle">
      <input id="gem-enabled" type="checkbox" />
      <span>Gemini Gem</span>
    </label>
  </div>
  <div id="gem" class="section-block hidden">Loading…</div>

  <div class="section-header">
    <label class="toggle">
      <input id="settings-enabled" type="checkbox" />
      <span>Change server URL (advanced only)</span>
    </label>
  </div>
  <div id="settings" class="section-block hidden">
    <div class="keyrow">
      <input id="server-url" type="text" placeholder="http://localhost:6969" />
      <button id="server-save">Save</button>
    </div>
    <div id="server-error" class="err"></div>
    <div class="sub">Override the default <code>http://localhost:6969</code> if the bridge runs on another host or port.</div>
  </div>

  <h2>Providers</h2>
  <div id="providers">Loading…</div>
  <button id="sync">Sync now</button>
  <script type="module" src="popup.js"></script>
</body>
</html>
