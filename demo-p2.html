<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;overflow:hidden;background:#c8b896;font-family:"Noto Sans SC",sans-serif;touch-action:pan-y}
#c{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
#q{position:absolute;left:24px;right:24px;top:16px;text-align:center;z-index:3;opacity:0;pointer-events:none}
#q .l1{font-family:"Noto Serif SC",serif;font-size:min(4.5vw,20px);font-weight:600;color:#4a3520}
#q .l2{font-size:min(3.5vw,14px);color:#6b5540;margin-top:4px}
#np{position:absolute;top:30%;left:50%;transform:translate(-50%,0) scale(0);opacity:0;pointer-events:none;z-index:6;text-align:center;transition:transform .4s,opacity .3s}
#np img{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid #FFD700;box-shadow:0 0 30px rgba(255,215,0,.5)}
#dh{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);z-index:4;color:#FFD700;font-size:min(4vw,16px);font-weight:600;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;white-space:nowrap;text-shadow:0 0 12px rgba(0,0,0,.5),0 2px 4px rgba(0,0,0,.6)}
#bz{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:260px;height:30px;z-index:5;display:flex;align-items:center}
#pl{position:absolute;left:-60px;right:-60px;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between;pointer-events:none;z-index:6}
#pl span{color:#1a1008;font-family:"Noto Serif SC",serif;font-size:min(3.5vw,14px);font-weight:700;background:rgba(200,184,150,.6);padding:1px 6px;border-radius:3px}
#pa{width:100%;position:relative;z-index:2}
#rc{position:relative;width:100%;height:30px;cursor:pointer}
#rb{position:absolute;top:50%;left:0;right:0;height:5px;background:rgba(100,75,50,.2);border-radius:3px;transform:translateY(-50%)}
#rf2{position:absolute;top:50%;left:0;height:5px;background:linear-gradient(90deg,#FFD700,#C4A46C);border-radius:3px;width:0%;transform:translateY(-50%)}
#ci2{position:absolute;top:50%;left:100%;transform:translate(-50%,-50%) scaleX(-1);font-size:min(5vw,22px);z-index:4}
#ibs{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;display:none;background:#000;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#ibs .t1{font-family:"Noto Serif SC",serif;font-size:min(5vw,22px);color:#FFD700;text-align:center;margin-bottom:20px;opacity:0;transition:opacity 1.2s}
#ibs .t2{font-size:min(3.5vw,15px);color:#C4A46C;text-align:center;opacity:0;transition:opacity 1.2s;transition-delay:.8s}
#ibs .arr{font-size:min(6.5vw,28px);color:#FFD700;text-align:center;margin-top:30px;opacity:0;transition:opacity 1s;transition-delay:2s;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#ds{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:none}
#dc2{position:absolute;top:0;left:0;width:100%;height:100%}
#ct2,#cb{position:absolute;left:0;right:0;height:0;background:#000;z-index:11;transition:height .8s}
#ct2{top:0}#cb{bottom:0}
#dtt{position:absolute;top:80px;left:24px;right:24px;text-align:center;z-index:12;opacity:0;transition:opacity 1.5s;font-family:"Noto Serif SC",serif;font-size:min(4.5vw,18px);color:#FFD700}
#dtb{position:absolute;bottom:100px;left:24px;right:24px;text-align:center;z-index:12;opacity:0;transition:opacity 1.5s;font-size:min(3.5vw,14px);color:#C4A46C}
#dtc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:12;opacity:0;transition:opacity 2s;font-family:"Noto Serif SC",serif;font-size:min(4vw,16px);color:#fff}
#ddn{position:absolute;top:0;left:0;width:100%;height:100%;z-index:11;background:rgba(0,0,0,0);transition:background 1.5s;pointer-events:none}
#sh{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:13;opacity:0;transition:opacity 1s;color:#C4A46C;font-size:min(3vw,13px);text-align:center}
#dl{position:absolute;top:0;left:0;width:100%;height:100%;z-index:9;display:none;pointer-events:none}
#hc{position:absolute;top:0;left:0;width:100%;height:100%;z-index:14;display:none;background:radial-gradient(ellipse at 50% 40%,#1e1810 0%,#0a0805 70%)}#hcBg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#ht{display:flex;width:100%;height:100%;transition:transform .5s}
#iv2{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;cursor:pointer}
#iv2 img{max-width:92vw;max-height:85vh;border-radius:8px;object-fit:contain}

#navL,#navR{position:absolute;top:50%;transform:translateY(-50%);z-index:16;width:44px;height:80px;background:rgba(0,0,0,.5);border:none;color:#FFD700;font-size:min(6.5vw,28px);cursor:pointer;display:none;align-items:center;justify-content:center;border-radius:6px;transition:background .3s;user-select:none;-webkit-user-select:none}
#navL:hover,#navR:hover{background:rgba(0,0,0,.75)}
#navL{left:8px}#navR{right:8px}

#enterHist{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:200;display:none;padding:12px 32px;background:rgba(0,0,0,.65);border:2px solid rgba(255,215,0,.8);color:#FFD700;font-family:"Noto Serif SC",serif;font-size:min(4.5vw,18px);cursor:pointer;border-radius:24px;text-shadow:0 0 8px rgba(255,215,0,.4);transition:all .4s;animation:pulse2 2s infinite}
#enterHist:hover{background:rgba(255,215,0,.2);box-shadow:0 0 20px rgba(255,215,0,.35)}

@keyframes pulse2{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.2)}50%{box-shadow:0 0 30px rgba(255,215,0,.6)}}

#chapter-intro{pointer-events:none}#chapter-intro,#chapter-outro{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:1;transition:opacity 0.8s}
#chapter-intro.hide,#chapter-outro.hide{opacity:0;pointer-events:none}
#chapter-outro{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:99999;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}#chapter-outro:hover{background:rgba(0,0,0,.95)}
#chapter-intro .ci-title{font-family:"Noto Serif SC",serif;font-size:min(7vw,30px);font-weight:700;color:#FFD700;text-align:center;margin-bottom:12px;text-shadow:0 0 20px rgba(255,215,0,.3)}
#chapter-intro .ci-sub{font-family:"Noto Serif SC",serif;font-size:min(4vw,17px);color:#C4A46C;text-align:center;max-width:300px;line-height:1.8}
#chapter-outro .co-text{font-family:"Noto Serif SC",serif;font-size:min(4vw,17px);color:#C4A46C;text-align:center;max-width:300px;line-height:1.8;margin-bottom:32px}
#chapter-outro .co-next{font-family:"Noto Sans SC",sans-serif;font-size:min(3.5vw,14px);color:#8B7355;text-align:center;animation:coPulse 2s infinite}
@keyframes coPulse{0%,100%{opacity:.5}50%{opacity:1}}

#back-btn{position:fixed;top:16px;left:16px;z-index:9998;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);font-size:min(4.5vw,18px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-family:sans-serif;line-height:1}
#back-btn:hover{background:rgba(0,0,0,.7);color:#FFD700;border-color:rgba(255,215,0,.4)}


</style></head><body><button id="back-btn" title="返回上一章">&#10094;</button>
<canvas id="c"></canvas><div id="city-icons" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;overflow:hidden"></div>
<div id="q"><div class="l1">穿越两千公里戈壁，你终于站在了标语面前。</div><div class="l2">你升起无人机，想从空中一览它的全貌。</div></div>
<div id="np"></div>
<div id="dh">滑动下方进度条，穿越2000公里旅途</div>
<div id="bz"><div id="pl"><span>成都</span><span>哈密</span></div><div id="pa"><div id="rc"><div id="rb"></div><div id="rf2"></div><div id="ci2">🚙</div></div></div></div>

<div id="ds"><canvas id="dc2"></canvas><canvas id="dl"></canvas><div id="ct2"></div><div id="cb"></div><div id="ddn"></div>
<div id="dtt"><span style="display:block;margin-bottom:16px">亲眼所见的伤痕远比卫星图上更加触目惊心</span>标语周围，多处圆形车辙碾压而过，<br>像一道道伤疤刻在"人民"中间。</div>
<div id="dtb">这些大字扛住了60年的风沙<br>却没能扛住几分钟的人为破坏。</div>
<div id="dtc"></div>
<div id="sh"></div></div>
<div id="hc"><canvas id="hcBg"></canvas><div id="ht"></div></div>

<button id="navL">&lt;</button><button id="navR">&gt;</button><button id="enterHist">翻开历史卡片</button>
<div id="iv2"><img id="ivi"></div>
<script src="p2.js?v=2"></script>
<div class="ci-sub">2000公里，从成都到哈密。</div></div>


<script>document.getElementById("back-btn").addEventListener("click",function(){window.parent.postMessage({type:"nav",page:"demo-p1.html"},"*")})</script>
<script>window.showOutro=function(){window.parent.postMessage({type:"nav",page:"demo-p3.html"},"*")}</script>

<script>document.addEventListener('play',function(e){if(e.target.tagName==='VIDEO'){parent.postMessage({type:'video-play'},'*')}},true);document.addEventListener('ended',function(e){if(e.target.tagName==='VIDEO'){parent.postMessage({type:'video-ended'},'*')}},true);</script><script>
(function(){
  // Intercept back button navigation
  var backBtn=document.getElementById('back-btn');
  if(backBtn){
    backBtn.addEventListener('click',function(e){
      e.preventDefault();
      var href=this.getAttribute('data-href')||this.getAttribute('href');
      if(href&&href.match(/demo-p\d/)){
        parent.postMessage({type:'nav',page:href.replace(/.*\//,'')},'*');
      }
    });
  }
  // Intercept showOutro navigation
  var origShowOutro=window.showOutro;
  window.showOutro=function(page){
    if(typeof page==='string'){parent.postMessage({type:'nav',page:page},'*')}
    else if(origShowOutro){origShowOutro()}
  };
})();
</script></body>
