services:
  gemini-bridge:
    build:
      context: .
    image: gemini-bridge:local
    container_name: gemini-bridge
    restart: unless-stopped
    ports:
      # Bind to localhost only so the bridge stays a private endpoint.
      - "127.0.0.1:6969:6969"
    volumes:
      - gemini-bridge-data:/data
    env_file:
      - path: ./.env
        required: false
    environment:
      - GEMINI_BRIDGE_PORT=6969
    stdin_open: false
    tty: false

volumes:
  gemini-bridge-data:
