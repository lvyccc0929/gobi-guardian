name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Create venv + install deps
        working-directory: server
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -r requirements.txt
      - name: Lint
        run: mise run lint
      - name: Run unit tests
        timeout-minutes: 5
        run: mise run test
