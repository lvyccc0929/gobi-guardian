<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>P5 · 卫星确认</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020810;font-family:"PingFang SC","Microsoft YaHei",sans-serif;touch-action:pan-y}
#intro{position:fixed;inset:0;z-index:2;overflow:hidden;cursor:grab}
#intro:active{cursor:grabbing}
#intro-track{display:flex;width:300%;height:100%;transition:transform 0.4s ease;will-change:transform}
.intro-page{flex:0 0 33.333%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#020810 0%,#0a1628 50%,#020810 100%);padding:0 50px;position:relative}
.intro-page .txt{font-size:17px;font-weight:600;color:#fff;text-align:center;line-height:2.1;white-space:pre-line}
#arrow-left,#arrow-right{position:fixed;top:50%;z-index:4;width:44px;height:44px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:32px;cursor:pointer;transition:all 0.3s;transform:translateY(-50%);background:rgba(255,255,255,0.04);border-radius:50%;-webkit-tap-highlight-color:transparent}
#arrow-left{left:6px}#arrow-right{right:6px}
#arrow-left:active,#arrow-right:active{color:#fff;background:rgba(255,255,255,0.12)}
#arrow-left.hide,#arrow-right.hide{opacity:0;pointer-events:none}
#pips{position:fixed;bottom:130px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:4;pointer-events:none}
#pips .pip{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all 0.3s}
#pips .pip.on{background:#00D4FF;box-shadow:0 0 8px rgba(0,212,255,0.5)}
#nav-hint{position:fixed;bottom:160px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;z-index:4;pointer-events:none;transition:opacity 0.3s}
#video-stage{position:fixed;inset:0;z-index:5;display:none;align-items:center;justify-content:center;background:#000;opacity:0;transition:opacity 0.8s}
#video-stage.show{opacity:1}
#video-stage video{width:100%;height:100%;object-fit:contain}
#video-controls{position:fixed;bottom:40px;left:0;right:0;z-index:6;display:none;justify-content:center;gap:24px;opacity:0;transition:opacity 0.5s;pointer-events:none}
#video-controls.show{opacity:1;pointer-events:auto}
#video-controls .vc{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;cursor:pointer;backdrop-filter:blur(4px);-webkit-tap-highlight-color:transparent}
#auto-play-hint{position:fixed;bottom:80px;left:0;right:0;z-index:4;text-align:center;font-size:13px;color:rgba(0,212,255,0.6);letter-spacing:2px;pointer-events:none;opacity:0;transition:opacity 0.5s}
#auto-play-hint.visible{opacity:1;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
</style>
</head>
<body>
<div id="intro"><div id="intro-track">
<div class="intro-page"><div class="txt">(P5-1) 施工结束，我却无法确认修复的效果。<br>无人机用不了——新疆全域进入了禁飞期。<br>整整一个多星期的努力，缺了一个最关键的句号。<br>就这样结束了吗？我不甘心。</div></div>
<div class="intro-page"><div class="txt">(P5-2) 既然我最初就是在卫星地图上发现这些地标的——<br>为什么不直接用卫星去看修复成果？<br>可公开的卫星影像更新时间都在一年以前，<br>没有一张能拍到我们刚刚修复的地面。</div></div>
<div class="intro-page"><div class="txt">(P5-3) 我们辗转联系到长光卫星。<br>他帮我们规划了一组只有 23 秒的拍摄窗口。<br>2025 年 9 月 28 日 12 时 45 分，<br>吉林一号从戈壁标地上空掠过，按下了快门。</div></div>
</div></div>
<div id="arrow-left">❮</div><div id="arrow-right">❯</div>
<div id="pips"><div class="pip on"></div><div class="pip"></div><div class="pip"></div></div>
<div id="nav-hint">← 点击两侧箭头翻页 →</div>
<div id="auto-play-hint">(P5-4) 即将播放卫星影像…</div>
<div id="video-stage"><video src="assets/satellite-footage.mp4" playsinline></video></div>
<div id="video-controls"><div class="vc" id="vcMute">🔊</div><div class="vc" id="vcPause">⏸</div></div>
<script>
(function(){
var track=document.getElementById("intro-track"),pips=document.querySelectorAll("#pips .pip");
var arrowL=document.getElementById("arrow-left"),arrowR=document.getElementById("arrow-right");
var navHint=document.getElementById("nav-hint"),autoHint=document.getElementById("auto-play-hint");
var vStage=document.getElementById("video-stage"),video=document.querySelector("#video-stage video"),vControls=document.getElementById("video-controls");
var vcMute=document.getElementById("vcMute"),vcPause=document.getElementById("vcPause");
var current=0,TOTAL=3,inVideo=false,ended=false,muted=false,autoTimer=null;

function goToPage(idx){
if(idx<0||idx>=TOTAL)return;
current=idx;
track.style.transform="translateX(-"+(idx*33.333)+"%)";
pips.forEach(function(p,i){p.classList.toggle("on",i===idx)});
arrowL.classList.toggle("hide",idx===0);
arrowR.classList.toggle("hide",idx===TOTAL-1);
if(idx===TOTAL-1){
  navHint.style.opacity="0";
  autoHint.classList.add("visible");
  if(autoTimer)clearTimeout(autoTimer);
  autoTimer=setTimeout(startVideo,2800);
}else{
  navHint.style.opacity="1";
  autoHint.classList.remove("visible");
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null}
}
}

arrowL.addEventListener("click",function(e){e.stopPropagation();goToPage(current-1)});
arrowL.addEventListener("touchend",function(e){e.preventDefault();e.stopPropagation();goToPage(current-1)});
arrowR.addEventListener("click",function(e){e.stopPropagation();goToPage(current+1)});
arrowR.addEventListener("touchend",function(e){e.preventDefault();e.stopPropagation();goToPage(current+1)});

var startX=0,swiping=false;
var intro=document.getElementById("intro");
intro.addEventListener("touchstart",function(e){startX=e.touches[0].clientX;swiping=true});
intro.addEventListener("touchmove",function(e){if(!swiping)return;e.preventDefault()},{passive:false});
intro.addEventListener("touchend",function(e){if(!swiping)return;swiping=false;
var dx=e.changedTouches[0].clientX-startX;
if(dx<-40)goToPage(current+1);else if(dx>40)goToPage(current-1)});

var mdX=0,mdActive=false;
intro.addEventListener("mousedown",function(e){mdX=e.clientX;mdActive=true;e.preventDefault()});
intro.addEventListener("mousemove",function(e){if(!mdActive)return;e.preventDefault()});
intro.addEventListener("mouseup",function(e){if(!mdActive)return;mdActive=false;
var dx=e.clientX-mdX;
if(dx<-50)goToPage(current+1);else if(dx>50)goToPage(current-1)});
intro.addEventListener("mouseleave",function(){mdActive=false});

intro.addEventListener("click",function(e){
if(e.target.closest("#arrow-left")||e.target.closest("#arrow-right"))return;
var x=e.clientX,w=window.innerWidth;
if(x<w*0.3)goToPage(current-1);else if(x>w*0.7)goToPage(current+1)});

document.addEventListener("keydown",function(e){if(e.key==="ArrowRight")goToPage(current+1);if(e.key==="ArrowLeft")goToPage(current-1)});

function startVideo(){
if(inVideo)return;inVideo=true;
if(autoTimer){clearTimeout(autoTimer);autoTimer=null}
navHint.style.display="none";autoHint.classList.remove("visible");
intro.style.display="none";arrowL.style.display="none";arrowR.style.display="none";
vStage.style.display="flex";requestAnimationFrame(function(){requestAnimationFrame(function(){vStage.classList.add("show")})});
video.muted=muted;video.play().then(function(){vControls.style.display="flex";requestAnimationFrame(function(){vControls.classList.add("show")})}).catch(function(){});
}

vcMute.addEventListener("click",function(){muted=!muted;video.muted=muted;vcMute.textContent=muted?"🔇":"🔊"});
vcPause.addEventListener("click",function(){if(video.paused){video.play();vcPause.textContent="⏸"}else{video.pause();vcPause.textContent="▶"}});
vStage.addEventListener("click",function(e){if(e.target===video)vControls.classList.toggle("show")});
video.addEventListener("ended",function(){vStage.style.opacity="0";vControls.style.display="none";
setTimeout(function(){vStage.style.display="none"},800);ended=true});
video.muted=false;
goToPage(0);
})();
</script>
</body>
</html>
